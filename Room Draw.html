<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Draw 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F2EC;
      --surface: #FDFCF9;
      --surface2: #EFECE4;
      --text: #1A1814;
      --text-muted: #7A7469;
      --accent: #D64E1E;
      --accent-light: #FAE8E2;
      --border: #DDD9CF;
      --green: #2A6B3C;
      --green-light: #E3F0E7;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease both;
    }

    .badge {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.1s; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .couple-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(214,78,30,0.12);
    }

    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .remove-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    .add-btn {
      width: 100%;
      margin-top: 4px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .add-btn:hover { background: var(--surface2); color: var(--text); }

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .room-tile {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      position: relative;
    }

    .room-tile.unlucky {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .room-tile input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 4px 0;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      box-shadow: none;
    }

    .room-tile input:focus { border-bottom-color: var(--accent); box-shadow: none; }
    .room-tile.unlucky input { border-bottom-color: rgba(214,78,30,0.3); }

    .room-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .room-tag.good { background: var(--green-light); color: var(--green); }
    .room-tag.bad { background: rgba(214,78,30,0.15); color: var(--accent); }

    .draw-btn {
      width: 100%;
      padding: 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .draw-btn:hover { background: #2e2b26; }
    .draw-btn:active { transform: scale(0.98); }

    .error {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 10px;
      min-height: 18px;
      font-weight: 500;
    }

    #results { animation: fadeUp 0.4s ease both; }

    .result-heading {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      animation: slideIn 0.35s ease both;
    }
    .result-item.unlucky {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .result-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
      background: var(--surface2);
      color: var(--text);
    }
    .result-item.unlucky .result-num {
      background: rgba(214,78,30,0.15);
      color: var(--accent);
    }

    .result-text { flex: 1; }
    .result-room-name {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .result-couple-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .result-item.unlucky .result-couple-name { color: var(--accent); }

    .result-emoji { font-size: 20px; }

    .redraw-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .redraw-btn:hover { background: var(--surface2); color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 400px) {
      .rooms-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="badge">June Trip 2025</div>
      <h1>Room <span>Draw</span></h1>
      <p class="subtitle">4 couples · 4 rooms · 1 unlucky one.<br>May the odds be ever in your favour.</p>
    </header>

    <div class="card">
      <div class="card-title">👫 Couples</div>
      <div id="couples-list"></div>
      <button class="add-btn" onclick="addCouple()">+ Add couple</button>
    </div>

    <div class="card">
      <div class="card-title">🛏️ Rooms</div>
      <div class="rooms-grid" id="rooms-list"></div>
    </div>

    <div class="error" id="error-msg"></div>

    <button class="draw-btn" onclick="doDraw()">✦ Draw rooms!</button>

    <div id="results" style="display:none;"></div>
  </div>

  <script>
    let couples = ["", "", "", ""];
    let rooms = [
      { name: "King suite", unlucky: false },
      { name: "Queen room", unlucky: false },
      { name: "Garden view room", unlucky: false },
      { name: "Twin beds room", unlucky: true },
    ];

    function renderCouples() {
      const list = document.getElementById('couples-list');
      list.innerHTML = '';
      couples.forEach((c, i) => {
        const row = document.createElement('div');
        row.className = 'couple-row';
        row.innerHTML = `
          <input type="text" placeholder="Couple ${i+1} (e.g. Minh & Lan)" value="${c}" oninput="couples[${i}]=this.value" />
          ${couples.length > 2 ? `<button class="remove-btn" onclick="removeCouple(${i})" title="Remove">✕</button>` : ''}
        `;
        list.appendChild(row);
      });
    }

    function renderRooms() {
      const list = document.getElementById('rooms-list');
      list.innerHTML = '';
      rooms.forEach((r, i) => {
        const tile = document.createElement('div');
        tile.className = 'room-tile' + (r.unlucky ? ' unlucky' : '');
        tile.innerHTML = `
          <input type="text" value="${r.name}" oninput="rooms[${i}].name=this.value" placeholder="Room name" />
          <div class="room-tag ${r.unlucky ? 'bad' : 'good'}">${r.unlucky ? '😬 Twin beds' : '✓ Nice room'}</div>
        `;
        list.appendChild(tile);
      });
    }

    function addCouple() {
      if (couples.length >= 8) return;
      couples.push('');
      renderCouples();
    }

    function removeCouple(i) {
      couples.splice(i, 1);
      renderCouples();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function doDraw() {
      document.getElementById('error-msg').textContent = '';
      const filled = couples.filter(c => c.trim() !== '');
      if (filled.length < rooms.length) {
        document.getElementById('error-msg').textContent = `Please enter at least ${rooms.length} couple names before drawing.`;
        return;
      }

      const emojis = ['🎉', '🌟', '🌴', '🏖️'];
      const shuffled = shuffle(filled.slice(0, rooms.length));
      const section = document.getElementById('results');
      section.style.display = 'block';
      section.innerHTML = '<div class="result-heading">Results</div>';

      rooms.forEach((room, i) => {
        const item = document.createElement('div');
        item.className = 'result-item' + (room.unlucky ? ' unlucky' : '');
        item.style.animationDelay = (i * 0.08) + 's';
        item.innerHTML = `
          <div class="result-num">${i + 1}</div>
          <div class="result-text">
            <div class="result-room-name">${room.name}</div>
            <div class="result-couple-name">${shuffled[i]}</div>
          </div>
          <div class="result-emoji">${room.unlucky ? '😅' : emojis[i % emojis.length]}</div>
        `;
        section.appendChild(item);
      });

      const redraw = document.createElement('button');
      redraw.className = 'redraw-btn';
      redraw.textContent = '↻  Not happy? Redraw';
      redraw.onclick = doDraw;
      section.appendChild(redraw);

      section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    renderCouples();
    renderRooms();
  </script>
</body>
</html>
